name: TestFlight Beta Build

on:
  push:
    tags:
      - 'v*-beta*'
      - 'v*-rc*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Beta environment'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - external

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed -E 's/^v(.+)-.*/\1/')
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION | Build: $BUILD_NUMBER | Tag: $TAG_NAME"

      - name: Select Xcode version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install fastlane
        run: |
          sudo gem install fastlane -NV

      - name: Setup Keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "Setting up keychain at: $KEYCHAIN_PATH"
          
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Set keychain settings (timeout 6 hours, no lock on sleep)
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          
          # Unlock keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Set as default keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          
          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          
          echo "✅ Keychain setup complete"

      - name: Setup code signing with fastlane match
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          fastlane match appstore \
            --readonly \
            --git_url "$MATCH_GIT_URL" \
            --app_identifier "com.olyforge3d.printfarmer.ios" \
            --keychain_name "$KEYCHAIN_PATH" \
            --keychain_password "$MATCH_PASSWORD"

      - name: Allow codesign keychain access
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Update build version numbers
        run: |
          agvtool new-version -all ${{ steps.version.outputs.build_number }}
          agvtool new-marketing-version ${{ steps.version.outputs.version }}

      - name: Build for App Store
        timeout-minutes: 30
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          xcodebuild \
            -project PrintFarmer.xcodeproj \
            -scheme PrintFarmer \
            -configuration Release \
            -derivedDataPath build \
            -archivePath "build/PrintFarmer.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="match AppStore com.olyforge3d.printfarmer.ios" \
            DEVELOPMENT_TEAM=ZPKA84F3TY \
            SWIFT_STRICT_CONCURRENCY=minimal \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export IPA
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          xcodebuild \
            -exportArchive \
            -archivePath "build/PrintFarmer.xcarchive" \
            -exportOptionsPlist .github/ExportOptions.plist \
            -exportPath "build/IPA" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Upload to TestFlight
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
        run: |
          fastlane pilot upload \
            --ipa "build/IPA/PrintFarmer.ipa" \
            --changelog "Beta build from tag: ${{ steps.version.outputs.tag_name }}" \
            --skip_waiting_for_build_processing

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ TestFlight Beta Build Uploaded",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*TestFlight Beta Uploaded*\n*Version:* ${{ steps.version.outputs.version }}\n*Build:* ${{ steps.version.outputs.build_number }}\n*Tag:* ${{ steps.version.outputs.tag_name }}\n*Repo:* <https://github.com/olyforge3d/PrintFarmerMobile|olyforge3d/PrintFarmerMobile>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: "PrintFarmer ${{ steps.version.outputs.version }}"
          body: |
            ## Beta Release: ${{ steps.version.outputs.version }}
            - Build Number: ${{ steps.version.outputs.build_number }}
            - Status: ✅ Uploaded to TestFlight
            - Access: Check TestFlight app or email invite

            **Release Notes:** Coming from commit history
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" || true
