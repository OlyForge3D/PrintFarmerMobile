excluded:
  - .build
  - Package.resolved
  - PrintFarmer.xcodeproj

identifier_name:
  min_length: 1
  max_length: 60

line_length:
  warning: 150
  error: 250

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 500
  error: 800

function_body_length:
  warning: 100
  error: 200

cyclomatic_complexity:
  warning: 15
  error: 25

trailing_comma:
  mandatory_comma: false

disabled_rules:
  - trailing_comma
